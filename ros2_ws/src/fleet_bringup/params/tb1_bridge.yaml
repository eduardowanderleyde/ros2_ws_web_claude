# Bridge Gazebo → ROS para o robô tb1 — apenas tópicos de sensores/controle.
# tf e joint_states foram movidos para bridges dedicados em multi_robot_sim.launch.py
# para evitar TF_OLD_DATA causado por contenção de threads no bridge misto.

# Odometria
- ros_topic_name: "tb1/odom"
  gz_topic_name: "tb1/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS
  lazy: false

# Comando de velocidade — Twist (não TwistStamped) compatível com DiffDrive do Gazebo
- ros_topic_name: "tb1/cmd_vel"
  gz_topic_name: "tb1/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# IMU
- ros_topic_name: "tb1/imu"
  gz_topic_name: "tb1/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS
  lazy: false

# LiDAR — movido para scan_bridge_tb1 dedicado em multi_robot_sim.launch.py
# Inicia DEPOIS do SLAM (period=9s) para garantir que o buffer TF esteja populado
# antes do primeiro scan chegar ao SLAM.
