# Override para nav2_minimal_tb4_sim:
# O bridge usa Twist (não TwistStamped), então disable stamped cmd_vel.
# Referência: Issue #94 turtlebot4_simulator - DiffDriveController ignoring stamped messages
bt_navigator:
  ros__parameters:
    enable_stamped_cmd_vel: false

controller_server:
  ros__parameters:
    enable_stamped_cmd_vel: false

velocity_smoother:
  ros__parameters:
    enable_stamped_cmd_vel: false

collision_monitor:
  ros__parameters:
    enable_stamped_cmd_vel: false

waypoint_follower:
  ros__parameters:
    enable_stamped_cmd_vel: false
